name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --extras all --with lint

      - name: black
        run: poetry run black --check countryinfo/

      - name: isort
        run: poetry run isort --check-only countryinfo/

      - name: flake8
        run: poetry run flake8 countryinfo/

      - name: ruff
        run: poetry run ruff check countryinfo/

      - name: mypy
        run: poetry run mypy countryinfo/

      - name: pylint
        run: poetry run pylint countryinfo/ --fail-under=8.0

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --extras all --with test

      - name: Run tests
        run: poetry run pytest
